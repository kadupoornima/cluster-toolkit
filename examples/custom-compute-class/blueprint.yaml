# blueprint.yaml
blueprint_name: gke-ccc-deployment

vars:
  project_id: hpc-toolkit-gsc
  deployment_name: ccc-yaml-1
  region: us-central1
  zone: us-central1-b
  # The ghpc_stage function copies the local ccc.yaml into the generated deployment folder
  ccc_manifest_path: $(ghpc_stage("./ccc.yaml"))

deployment_groups:
- group: primary
  modules:
  - id: network
    source: modules/network/vpc
    settings:
      network_name: ccc-vpc
      subnetworks:
      - subnet_name: ccc-subnet
        subnet_region: $(vars.region)
        subnet_ip: 10.0.0.0/16

  - id: my-cluster
    source: modules/scheduler/gke-cluster
    use: [network]
    settings:
      system_node_pool_machine_type: "e2-standard-4"
      # Note: If your cluster version is < 1.33.3, nodePoolAutoCreation in CCC
      # requires you to manually enable cluster-level NAP by uncommenting below:
      # enable_node_autoprovisioning: true

  - id: deploy-ccc-manifest
    source: modules/management/kubectl-apply
    use: [my-cluster]
    settings:
      apply_manifests:
      - source: $(vars.ccc_manifest_path)
