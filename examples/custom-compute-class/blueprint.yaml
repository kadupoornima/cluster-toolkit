# blueprint.yaml
blueprint_name: gke-ccc-deployment

vars:
  project_id: hpc-toolkit-gsc
  deployment_name: ccc-yaml-1
  region: us-central1
  zone: us-central1-b
  machine_type: g4-standard-48
  static_node_count: 2
  authorized_cidr: 0.0.0.0/0
  # The ghpc_stage function copies the local ccc.yaml into the generated deployment folder
  ccc_manifest_path: $(ghpc_stage("./ccc.yaml"))

deployment_groups:
- group: primary
  modules:
  - id: network1
    source: modules/network/vpc
    settings:
      subnetwork_name: $(vars.deployment_name)-subnet
      secondary_ranges_list:
      - subnetwork_name: $(vars.deployment_name)-subnet
        ranges:
        - range_name: pods
          ip_cidr_range: 10.4.0.0/14
        - range_name: services
          ip_cidr_range: 10.0.32.0/20
  - id: node_pool_service_account
    source: modules/project/service-account
    settings:
      name: gke-np-sa
      project_roles:
      - logging.logWriter
      - monitoring.metricWriter
      - monitoring.viewer
      - stackdriver.resourceMetadata.writer
      - storage.objectViewer
      - artifactregistry.reader

  - id: workload_service_account
    source: modules/project/service-account
    settings:
      name: gke-wl-sa
      project_roles:
      - logging.logWriter
      - monitoring.metricWriter
      - monitoring.viewer
      - stackdriver.resourceMetadata.writer
      - storage.objectAdmin
      - artifactregistry.reader

  - id: n4-cluster
    source: modules/scheduler/gke-cluster
    use: [network1, workload_service_account]
    settings:
      system_node_pool_machine_type: "e2-standard-16"
      system_node_pool_disk_size_gb: 100
      system_node_pool_taints: []
      enable_dcgm_monitoring: true
      enable_private_endpoint: false # Allows access from authorized public IPs
      configure_workload_identity_sa: true
      master_authorized_networks:
      - cidr_block: $(vars.authorized_cidr) # Allows your machine to run the kubectl command. Required for multi network setup.
        display_name: "kubectl-access-network"
      # Cluster versions cannot be updated through the toolkit after creation
      # Please manage cluster version from the Google Cloud Console directly
      version_prefix: "1.35.2-gke.1485000"
      release_channel: RAPID
      maintenance_exclusions:
      - name: no-minor-or-node-upgrades-indefinite
        start_time: "2025-12-01T00:00:00Z"
        exclusion_scope: NO_MINOR_OR_NODE_UPGRADES
        exclusion_end_time_behavior: UNTIL_END_OF_SUPPORT
    outputs: [instructions]

  - id: n4-pool
    source: modules/compute/gke-node-pool
    use: [n4-cluster, node_pool_service_account]
    settings:
      machine_type: $(vars.machine_type)
      auto_upgrade: true
      zones: [$(vars.zone)]
      static_node_count: $(vars.static_node_count)
    outputs: [instructions]

  - id: deploy-ccc-manifest
    source: modules/management/kubectl-apply
    use: [n4-cluster]
    settings:
      apply_manifests:
      - source: $(vars.ccc_manifest_path)
      - source: $(ghpc_stage("./namespace.yaml"))
